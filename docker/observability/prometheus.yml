global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ekko-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: "otel-collector-self"
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
