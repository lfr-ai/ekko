services:
  app:
    build:
      context: ..
      dockerfile: docker/Containerfile
      target: dev
    ports:
      - "8000:8000"
    environment:
      EKKO_ENVIRONMENT: local
      EKKO_POSTGRESQL_HOST: db
      EKKO_POSTGRESQL_PORT: "5432"
      EKKO_POSTGRESQL_USER: postgres
      EKKO_POSTGRESQL_PASSWORD: postgres  # pragma: allowlist secret
      EKKO_POSTGRESQL_NAME: ekko
    volumes:
      - ../backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: postgres:16-alpine
    container_name: ekko_postgres_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # pragma: allowlist secret
      POSTGRES_DB: ekko
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ekko"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  caddy:
    build:
      context: ../caddy
      dockerfile: Containerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: localhost
    depends_on:
      - app
    networks:
      - backend
      - frontend

volumes:
  pgdata:
    name: ekko_pgdata

networks:
  backend:
  frontend:
