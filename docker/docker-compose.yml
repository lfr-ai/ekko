version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    restart: unless-stopped
    depends_on:
      - redis
      - db

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # pragma: allowlist secret
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "5432:5432"
    restart: unless-stopped
