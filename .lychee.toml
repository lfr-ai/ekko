cache = true
max_cache_age = "1d"
max_concurrency = 16
timeout = 30
max_retries = 3
max_redirects = 3
retry_wait_time = 5
accept = [200, 203, 204, 301, 302, 403, 429]

exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "^https?://\\[::1\\]",
  "^https?://example\\.com",
  "^https?://example\\.org",
  "^https?://your-domain\\.com",
  "^https?://your-",
  "^https?://[a-z0-9-]+\\.services\\.ai\\.azure\\.com",
  "^https?://[a-z0-9-]+\\.cognitiveservices\\.azure\\.com",
  "^https?://mcp\\.context7\\.com/mcp$",
  "^https?://schemas\\.anthropic\\.com/mcp/servers\\.json$",
  "\\{\\{",
  "\\{%",
  "\\$\\{",
  "%7B.*%7D",
]

exclude_path = [
  "node_modules",
  ".git",
  "dist",
  "build",
  ".venv",
  "__pycache__",
  ".tox",
  ".*.egg-info",
  "uv.lock",
  "pyproject.toml",
  ".pre-commit-config.yaml",
  ".env.*",
  ".gsd",
  "docs",
  "storybook-static",
]

skip_missing = true
no_progress = true
