# Warp Terminal Configuration for Ekko
# https://docs.warp.dev/getting-started/readme

# This file configures Warp-specific features and AI integrations
# Place in: ~/.warp/launch_configurations/ or project root

# Project-specific launch configuration
---
name: "Ekko Development"
description: "Full-stack development environment for Ekko AI voice assistant"

# Default working directory
working_directory: "."

# Environment variables
environment:
  EKKO_ENVIRONMENT: "local"
  PYTHONPATH: "backend/src"
  LOG_LEVEL: "DEBUG"

# Startup commands
startup_commands:
  - name: "Check Environment"
    command: |
      echo "🚀 Ekko Development Environment"
      echo "================================"
      echo ""
      echo "Python: $(python --version 2>&1)"
      echo "Node: $(node --version 2>&1)"
      echo "Bun: $(bun --version 2>&1)"
      echo ""
      echo "📦 To install dependencies: task install"
      echo "🏃 To start dev servers: task dev"
      echo "🧪 To run tests: task test"
      echo "✅ To run quality checks: task check"

# Warp AI context
ai_context:
  # Project type
  project_type: "full-stack"
  
  # Technology stack
  technologies:
    - Python 3.12
    - FastAPI
    - SQLAlchemy
    - CrewAI
    - React 19
    - TypeScript
    - Vite
    - Tailwind CSS v4
  
  # Architecture notes
  architecture: |
    This project follows Clean Architecture:
    - Core: Domain logic (no external dependencies)
    - Application: Use case orchestration
    - Infrastructure: External integrations
    - Presentation: API/UI layer
  
  # Common tasks
  common_commands:
    - command: "task dev"
      description: "Start backend + frontend in development mode"
    
    - command: "task test"
      description: "Run all tests"
    
    - command: "task lint"
      description: "Run linters (ruff, biome, mypy)"
    
    - command: "task format"
      description: "Format all code"
    
    - command: "task check"
      description: "Full quality gate (lint + test + typecheck)"
    
    - command: "task db:migrate"
      description: "Run database migrations"
    
    - command: "task registry:generate"
      description: "Regenerate constants from naming registry"
    
    - command: "cd backend && uv run python -m pytest"
      description: "Run backend tests"
    
    - command: "cd frontend && bun test"
      description: "Run frontend tests"
    
    - command: "cd backend && uv run alembic revision --autogenerate -m 'description'"
      description: "Create new database migration"

# Custom workflows
workflows:
  - name: "Full Development Setup"
    description: "Install dependencies and start all services"
    commands:
      - "task install"
      - "task dev"
  
  - name: "Backend Development"
    description: "Backend-focused development"
    commands:
      - "cd backend"
      - "uv sync"
      - "uv run uvicorn ekko.cli.run_app:app --reload"
  
  - name: "Frontend Development"
    description: "Frontend-focused development"
    commands:
      - "cd frontend"
      - "bun install"
      - "bun dev"
  
  - name: "Run Quality Checks"
    description: "Lint, type check, and test"
    commands:
      - "task lint"
      - "task typecheck"
      - "task test"
  
  - name: "Database Management"
    description: "Common database operations"
    commands:
      - "cd backend"
      - "# Run migrations: uv run alembic upgrade head"
      - "# Create migration: uv run alembic revision --autogenerate -m 'msg'"
      - "# Rollback: uv run alembic downgrade -1"

# Warp Drive (saved commands)
drive_commands:
  # Development
  - alias: "dev:all"
    command: "task dev"
    description: "Start all services"
  
  - alias: "dev:backend"
    command: "cd backend && uv run uvicorn ekko.cli.run_app:app --reload --port 8000"
    description: "Start backend only"
  
  - alias: "dev:frontend"
    command: "cd frontend && bun dev"
    description: "Start frontend only"
  
  # Testing
  - alias: "test:all"
    command: "task test"
    description: "Run all tests"
  
  - alias: "test:unit"
    command: "task test:unit"
    description: "Run unit tests"
  
  - alias: "test:watch"
    command: "cd backend && uv run pytest --watch"
    description: "Run tests in watch mode"
  
  - alias: "test:cov"
    command: "task test:coverage"
    description: "Run tests with coverage"
  
  # Quality
  - alias: "check:all"
    command: "task check"
    description: "Run all quality checks"
  
  - alias: "check:types"
    command: "task typecheck"
    description: "Type check all code"
  
  - alias: "fix:all"
    command: "task format && task lint:fix"
    description: "Auto-fix formatting and linting issues"
  
  # Database
  - alias: "db:migrate"
    command: "cd backend && uv run alembic upgrade head"
    description: "Run pending migrations"
  
  - alias: "db:rollback"
    command: "cd backend && uv run alembic downgrade -1"
    description: "Rollback last migration"
  
  - alias: "db:reset"
    command: "cd backend && rm -f ekko.db && uv run alembic upgrade head"
    description: "Reset database"
  
  # Build
  - alias: "build:backend"
    command: "task build:exe"
    description: "Build standalone executable"
  
  - alias: "build:frontend"
    command: "cd frontend && bun run build"
    description: "Build frontend for production"
  
  # Git workflows
  - alias: "git:sync"
    command: "git pull --rebase origin main && task install"
    description: "Sync with main and update dependencies"
  
  - alias: "git:clean"
    command: "git clean -fdx && task install"
    description: "Clean all generated files and reinstall"

# AI assistant configuration
ai_assistant:
  enabled: true
  
  # Context about the project
  context_hints:
    - "This is a Python + React full-stack application"
    - "Use 'task' command for all workflows"
    - "Backend uses FastAPI with Clean Architecture"
    - "Frontend uses React 19 + TypeScript + Vite"
    - "Testing uses pytest for backend, Vitest for frontend"
    - "Always run 'task check' before committing"
  
  # Suggested commands based on context
  smart_suggestions:
    after_git_pull:
      - "task install"
      - "task db:migrate"
    
    after_new_file:
      - "task format"
      - "task lint"
    
    after_test_failure:
      - "task test:unit --lf"  # Run last failed
      - "task lint"
      - "task typecheck"
