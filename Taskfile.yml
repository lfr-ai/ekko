version: "3"

tasks:
  install:
    desc: Install dependencies with uv
    cmds:
      - uv sync --all-extras

  dev:
    desc: Run FastAPI app in reload mode
    cmds:
      - uv run uvicorn voice.interaction.main:app --reload --host 127.0.0.1 --port 8000

  test:
    desc: Run default (non-integration) test suite
    cmds:
      - uv run pytest -q

  test:integration:
    desc: Run integration tests only
    cmds:
      - uv run pytest -q -m integration

  lint:
    desc: Run static checks
    cmds:
      - uv run ruff check src tests
      - uv run mypy --config-file pyproject.toml src

  architecture:
    desc: Validate Clean Architecture import boundaries
    cmds:
      - uv run python scripts/check_architecture_boundaries.py

  format:
    desc: Format Python code
    cmds:
      - uv run ruff format src tests

  precommit:
    desc: Run pre-commit hooks against all files
    cmds:
      - uv run pre-commit run --all-files

  db:migrate:
    desc: Run alembic migrations
    cmds:
      - uv run alembic upgrade head

  db:make_migration:
    desc: Create a new alembic revision
    cmds:
      - uv run alembic revision --autogenerate -m "$(msg)"

  frontend:install:
    desc: Install frontend dependencies
    cmds:
      - cd frontend && bun install

  frontend:test:
    desc: Run frontend tests
    cmds:
      - cd frontend && bun test

  frontend:e2e:
    desc: Run frontend Playwright tests
    cmds:
      - cd frontend && bunx playwright test

  check:
    desc: Full local quality gate
    deps: [lint, architecture, test]
