[tox]
min_version = 4.28
env_list = coverage
requires =
    tox>=4.28
    tox-uv>=1.16.0

[testenv:unit]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
change_dir = backend
commands =
    pytest tests/unit -v --tb=short {posargs}

[testenv:property]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
change_dir = backend
commands =
    pytest tests/property -v --tb=short {posargs}

[testenv:integration]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
change_dir = backend
commands =
    pytest tests/integration -v --tb=short {posargs}

[testenv:tests-all]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
change_dir = backend
commands =
    pytest tests -v --tb=short {posargs}

[testenv:coverage]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
change_dir = backend
commands =
    pytest tests/unit tests/property tests/integration ../tests --cov --cov-report=html --cov-report=term-missing {posargs}
