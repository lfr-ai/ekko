[tox]
envlist = unit, property, lint, typecheck, security
skipsdist = true

[testenv]
runner = uv-venv-runner
deps = .[dev]
setenv =
    EKKO_ENVIRONMENT = test
    PYTHONPATH = {toxinidir}/src

[testenv:unit]
description = Run unit tests
commands = pytest tests/unit/ -v --tb=short -x

[testenv:property]
description = Run property-based tests (Hypothesis)
commands = pytest tests/property/ -v --tb=short

[testenv:integration]
description = Run integration tests (requires DB)
commands = pytest tests/integration/ -v --tb=short -m integration

[testenv:performance]
description = Run performance benchmarks
commands = pytest tests/performance/ -v --benchmark-only

[testenv:lint]
description = Run linter checks
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:typecheck]
description = Run type checking
commands = mypy src/ekko/

[testenv:security]
description = Run security checks
commands =
    bandit -c pyproject.toml -r src/ekko/
    pip-audit --strict

[testenv:coverage]
description = Run tests with coverage report
commands = pytest tests/ --cov=src/ekko --cov-branch --cov-report=term-missing --cov-fail-under=70

[testenv:coverage-core]
description = Coverage gate for core + application layers (80% threshold)
commands = pytest tests/unit/ tests/property/ --cov=src/ekko/core --cov=src/ekko/application --cov-branch --cov-fail-under=80

[testenv:e2e]
description = Run end-to-end tests
commands = pytest tests/e2e/ -v --tb=short

[testenv:tests-all]
description = Run all test suites
commands = pytest tests/ -v --tb=short

[testenv:registry-check]
description = Verify generated registry constants are up-to-date
commands = python -m registry.generate_registry --check

[testenv:links]
description = Check for broken links in docs
commands = lychee --config .lychee.toml .

[testenv:duplicates]
description = Check for code duplication
commands = npx jscpd --config .jscpd.json
