[tox]
min_version = 4.25
env_list = coverage
requires =
    tox>=4.25
    tox-uv>=1.25

[testenv:unit]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
commands =
    pytest tests/unit -v --tb=short {posargs}

[testenv:property]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
commands =
    pytest tests/property -v --tb=short {posargs}

[testenv:integration]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
commands =
    pytest tests/integration -v --tb=short {posargs}

[testenv:performance]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
commands =
    pytest tests/performance -v --benchmark-only {posargs}

[testenv:e2e]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
commands =
    pytest tests/e2e -v --tb=short {posargs}

[testenv:tests-all]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
commands =
    pytest tests -v --tb=short {posargs}

[testenv:coverage]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --link-mode=copy
commands =
    pytest tests/unit tests/property tests/integration --cov --cov-report=html --cov-report=term-missing {posargs}
