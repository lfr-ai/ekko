name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          bun install --cwd frontend || true
      - name: Lint
        run: |
          bun --cwd frontend run lint || true
      - name: Typecheck
        run: |
          bun --cwd frontend run typecheck || true
      - name: Unit + E2E tests
        run: |
          bun --cwd frontend run test || true
          bun --cwd frontend run test:e2e || true
      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report || ''
