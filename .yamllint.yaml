---
extends: default

ignore: |
  .venv/
  .venv*/
  **/.venv/
  **/.venv*/
  node_modules/
  **/node_modules/

rules:
  line-length:
    max: 120
    level: warning
  indentation:
    spaces: 2
    indent-sequences: consistent
  comments:
    min-spaces-from-content: 1
  truthy:
    allowed-values: ["true", "false", "yes", "no", "on", "off"]
    check-keys: false
  document-start: disable
  new-lines:
    type: unix
  empty-lines:
    max: 1
    max-end: 1
  brackets: disable
  commas: disable
