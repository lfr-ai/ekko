# .coderabbit.yaml — CodeRabbit AI Code Review Configuration
# Docs: https://docs.coderabbit.ai/guides/configuration

language: en-US

reviews:
  auto_review:
    enabled: true
    drafts: false

  request_changes_workflow: false
  profile: assertive

  instructions: |
    This project follows strict Clean Architecture with dependency direction:
    core -> utils -> config -> infrastructure -> application -> composition -> presentation.
    No use of `Any` in type annotations. Use `BaseDict`/`JSONDict` instead of bare dict.
    All dataclasses must use frozen=True, slots=True (except Container).
    Use structlog for logging, never print(). Use keyword-only args (*) for 3+ params.
    Always chain exceptions: raise NewError(...) from original_error.
    Use Final[type] for module-level constants.

  path_instructions:
    - path: "backend/src/ekko/core/**"
      instructions: |
        Domain core layer (Clean Architecture). Must have ZERO framework imports.
        No SQLAlchemy, no FastAPI, no LangChain. Only stdlib, utils, and config imports.
        All classes should use @dataclass(frozen=True, slots=True).
        No use of `Any` in type annotations.

    - path: "backend/src/ekko/presentation/**"
      instructions: |
        Outermost layer (Clean Architecture). May import from application, core,
        config, and utils. Use fastapi.status constants instead of raw HTTP integers.
        Use structlog, never print().

    - path: "backend/src/ekko/infrastructure/**"
      instructions: |
        Infrastructure layer. May import from core, config, utils, and external libs.
        Must NOT import from presentation or application layers.

    - path: "backend/src/ekko/application/**"
      instructions: |
        Application layer. May import from core, infrastructure, ai, config, utils.
        Must NOT import from presentation layer.

    - path: "backend/src/ekko/ai/**"
      instructions: |
        AI vertical layer. May import from core, config, utils only.
        Must NOT import from application, infrastructure, or presentation.

    - path: "frontend/src/**"
      instructions: |
        React 19 + TypeScript frontend. Uses Vite, shadcn/ui, Tailwind CSS v4,
        Zustand for state, TanStack React Query. Follow Clean Architecture with
        domain/application/infrastructure/presentation layers.

    - path: "tests/**"
      instructions: |
        Test files. Must use pytest markers (@pytest.mark.unit, @pytest.mark.integration).
        Use factory-boy for test data. Use hypothesis for property-based tests.

  tools:
    ruff:
      enabled: true
    biome:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true

chat:
  auto_reply: true

path_filters:
  - "!**/*.lock"
  - "!**/bun.lock"
  - "!**/*.min.js"
  - "!**/*.min.css"
  - "!**/dist/**"
  - "!**/node_modules/**"
  - "!**/__pycache__/**"
  - "!**/*.pyc"
  - "!**/migrations/versions/**"
  - "!backend/src/ekko/core/registry_constants.py"
